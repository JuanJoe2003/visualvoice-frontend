<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualVoice — Trophies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --green-dark:#1a7a2e;--green-mid:#2ecc54;--green-light:#57e07a;
            --gold:#FFD700;--gold-dark:#d4a800;--bg:#0f1f13;--sidebar-bg:#111d15;
            --card-bg:#162a1b;--border:#243d2b;--text:#e8f5ec;--muted:#7aad88;
            --danger:#ff4757;--streak:#ff6b35;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

        /* ── SIDEBAR ── */
        .sidebar{width:240px;min-height:100vh;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform 0.3s;}
        .sidebar-logo{font-family:'Fredoka One',cursive;font-size:1.7rem;color:var(--green-mid);padding:0.5rem 0.5rem 1.5rem;display:flex;align-items:center;gap:0.5rem;}
        .sidebar-nav{flex:1;}
        .nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;border-radius:14px;margin-bottom:0.3rem;cursor:pointer;transition:all 0.2s;color:var(--muted);font-weight:700;font-size:0.95rem;text-decoration:none;border:2px solid transparent;}
        .nav-item:hover{background:rgba(46,204,84,0.08);color:var(--green-light);}
        .nav-item.active{background:rgba(46,204,84,0.15);color:var(--green-mid);border-color:rgba(46,204,84,0.25);}
        .nav-item i{width:20px;text-align:center;}
        .nav-divider{height:1px;background:var(--border);margin:0.8rem 0.5rem;}
        .sidebar-user{background:var(--card-bg);border-radius:16px;padding:1rem;border:1px solid var(--border);margin-top:auto;}
        .user-info{display:flex;align-items:center;gap:0.75rem;}
        .user-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--green-mid),var(--green-dark));display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;color:#fff;border:2px solid var(--gold);flex-shrink:0;}
        .user-name{font-size:0.88rem;font-weight:800;color:var(--text);}
        .user-level{font-size:0.72rem;color:var(--muted);font-weight:600;}

        /* ── MAIN ── */
        .main{margin-left:240px;flex:1;padding:2rem;max-width:calc(100vw - 240px);overflow-x:hidden;}
        .page-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--text);margin-bottom:0.3rem;}
        .page-sub{color:var(--muted);font-size:0.9rem;font-weight:600;margin-bottom:2rem;}

        /* ── SUMMARY BAR ── */
        .trophy-summary{display:flex;align-items:center;gap:2rem;background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:1.5rem 2rem;margin-bottom:2rem;flex-wrap:wrap;}
        .summary-stat{text-align:center;}
        .summary-val{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--gold);display:block;}
        .summary-lbl{font-size:0.75rem;font-weight:800;color:var(--muted);text-transform:uppercase;}
        .summary-bar-wrap{flex:1;min-width:200px;}
        .summary-bar-label{font-size:0.8rem;font-weight:700;color:var(--muted);margin-bottom:0.4rem;}
        .summary-bar-track{height:12px;background:rgba(255,255,255,0.07);border-radius:20px;overflow:hidden;}
        .summary-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold-dark),var(--gold));border-radius:20px;transition:width 1s ease;}

        /* ── FILTER TABS ── */
        .filter-row{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap;}
        .filter-btn{padding:0.45rem 1rem;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:800;cursor:pointer;transition:all 0.2s;}
        .filter-btn:hover{border-color:var(--green-mid);color:var(--green-light);}
        .filter-btn.active{background:rgba(46,204,84,0.15);border-color:rgba(46,204,84,0.3);color:var(--green-mid);}

        /* ── TROPHIES GRID ── */
        .trophies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;}

        .trophy-card{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:1.5rem;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;transition:all 0.25s;cursor:pointer;}
        .trophy-card.unlocked:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 12px 30px rgba(255,215,0,0.15);}
        .trophy-card.locked{opacity:0.45;cursor:default;}
        .trophy-card.locked:hover{transform:none;border-color:var(--border);box-shadow:none;}

        .trophy-emoji-big{font-size:3.5rem;margin-bottom:0.75rem;filter:drop-shadow(0 4px 10px rgba(0,0,0,0.4));display:block;}
        .trophy-card.locked .trophy-emoji-big{filter:grayscale(1) brightness(0.5);}

        .trophy-card-name{font-family:'Fredoka One',cursive;font-size:1.05rem;color:var(--text);margin-bottom:0.3rem;}
        .trophy-card.locked .trophy-card-name{color:var(--muted);}
        .trophy-card-desc{font-size:0.75rem;font-weight:700;color:var(--muted);line-height:1.4;margin-bottom:0.8rem;}

        .trophy-status{font-size:0.72rem;font-weight:900;padding:0.25rem 0.7rem;border-radius:20px;}
        .status-earned{background:rgba(46,204,84,0.15);color:var(--green-mid);border:1px solid rgba(46,204,84,0.3);}
        .status-locked{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border);}

        .trophy-new{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;font-size:0.55rem;font-weight:900;padding:3px 7px;border-radius:20px;text-transform:uppercase;}

        /* ── MODAL ── */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;pointer-events:none;transition:opacity 0.2s;}
        .modal-overlay.show{opacity:1;pointer-events:all;}
        .modal{background:#162a1b;border:2px solid var(--gold);border-radius:24px;padding:2.5rem;text-align:center;max-width:320px;width:90%;box-shadow:0 20px 60px rgba(255,215,0,0.2);transform:scale(0.9);transition:transform 0.25s;}
        .modal-overlay.show .modal{transform:scale(1);}
        .modal-emoji{font-size:5rem;display:block;margin-bottom:0.5rem;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.4));}
        .modal-title{font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--gold);margin-bottom:0.4rem;}
        .modal-desc{font-size:0.88rem;font-weight:700;color:var(--muted);margin-bottom:1.5rem;line-height:1.5;}
        .modal-status{font-size:0.82rem;font-weight:800;padding:0.4rem 1rem;border-radius:20px;margin-bottom:1.5rem;display:inline-block;}
        .modal-close{background:var(--green-mid);color:#fff;border:none;border-radius:12px;padding:0.7rem 2.5rem;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;transition:all 0.2s;}
        .modal-close:hover{background:var(--green-light);}

        /* ── LOADING ── */
        .loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1rem;}
        .loading-logo{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--green-mid);}
        .loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green-mid);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}

        .mobile-header{display:none;position:fixed;top:0;left:0;right:0;background:var(--sidebar-bg);border-bottom:1px solid var(--border);padding:1rem 1.5rem;z-index:200;align-items:center;justify-content:space-between;}
        .mobile-logo{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--green-mid);}
        .hamburger{background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;}
        @media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main{margin-left:0;padding:1rem;padding-top:5rem;max-width:100vw;}.mobile-header{display:flex;}.trophies-grid{grid-template-columns:repeat(2,1fr);}}
    </style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
    <div class="loading-logo">🤟 VisualVoice</div>
    <div class="loading-spinner"></div>
</div>

<header class="mobile-header">
    <div class="mobile-logo">🤟 VisualVoice</div>
    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
</header>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><span>🤟</span> VisualVoice</div>
    <nav class="sidebar-nav">
        <a class="nav-item" href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
        <a class="nav-item" href="learn.html"><i class="fas fa-graduation-cap"></i> Learn</a>
        <a class="nav-item" href="practice.html"><i class="fas fa-camera"></i> Practice</a>
        <a class="nav-item" href="progress.html"><i class="fas fa-chart-bar"></i> Progress</a>
        <a class="nav-item active" href="trophies.html"><i class="fas fa-trophy"></i> Trophies</a>
        <a class="nav-item" href="leaderboard.html"><i class="fas fa-users"></i> Leaderboard</a>
        <div class="nav-divider"></div>
        <a class="nav-item" href="#"><i class="fas fa-store"></i> Shop</a>
        <a class="nav-item" href="#"><i class="fas fa-cog"></i> Settings</a>
        <a class="nav-item" id="logout-link" href="#"><i class="fas fa-sign-out-alt"></i> Log Out</a>
    </nav>
    <div class="sidebar-user">
        <div class="user-info">
            <div class="user-avatar" id="sb-avatar">?</div>
            <div>
                <div class="user-name" id="sb-name">Loading...</div>
                <div class="user-level" id="sb-level">⚡ 0 XP</div>
            </div>
        </div>
    </div>
</aside>

<!-- Trophy Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
        <span class="modal-emoji" id="modal-emoji">🏆</span>
        <div class="modal-title" id="modal-title">Trophy</div>
        <div class="modal-desc" id="modal-desc">Description</div>
        <div class="modal-status" id="modal-status"></div>
        <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('show')">Nice!</button>
    </div>
</div>

<main class="main">
    <div class="page-title">🏆 Trophies</div>
    <div class="page-sub" id="page-sub">Loading your achievements...</div>

    <!-- Summary bar -->
    <div class="trophy-summary">
        <div class="summary-stat">
            <span class="summary-val" id="sum-earned">0</span>
            <span class="summary-lbl">Earned</span>
        </div>
        <div class="summary-stat">
            <span class="summary-val" style="color:var(--muted);" id="sum-total">0</span>
            <span class="summary-lbl">Total</span>
        </div>
        <div class="summary-bar-wrap">
            <div class="summary-bar-label" id="sum-bar-label">0 / 0 trophies unlocked</div>
            <div class="summary-bar-track">
                <div class="summary-bar-fill" id="sum-bar" style="width:0%"></div>
            </div>
        </div>
    </div>

    <!-- Filter -->
    <div class="filter-row">
        <button class="filter-btn active" onclick="filterTrophies('all', this)">All</button>
        <button class="filter-btn" onclick="filterTrophies('unlocked', this)">Earned ✓</button>
        <button class="filter-btn" onclick="filterTrophies('locked', this)">Locked 🔒</button>
    </div>

    <!-- Grid -->
    <div class="trophies-grid" id="trophies-grid"></div>
</main>

<script type="module">
    import { requireAuth, logOut } from './auth.js';
    import { getUserProgress, TROPHY_DEFS } from './progress.js';

    const user = await requireAuth();
    document.getElementById('logout-link').addEventListener('click', async e => { e.preventDefault(); await logOut(); });

    const prog = await getUserProgress(user.uid);
    document.getElementById('loading-overlay').style.display = 'none';

    // Sidebar
    const init = (prog.name || 'U')[0].toUpperCase();
    document.getElementById('sb-avatar').textContent = init;
    document.getElementById('sb-name').textContent = prog.name;
    document.getElementById('sb-level').textContent = `⚡ ${prog.xp} XP · ${prog.league}`;
    document.getElementById('page-sub').textContent = `${prog.trophies.length} of ${TROPHY_DEFS.length} trophies earned`;

    // Summary
    const earned = prog.trophies.length;
    const total = TROPHY_DEFS.length;
    const pct = Math.round((earned / total) * 100);
    document.getElementById('sum-earned').textContent = earned;
    document.getElementById('sum-total').textContent = total;
    document.getElementById('sum-bar-label').textContent = `${earned} / ${total} trophies unlocked`;
    setTimeout(() => document.getElementById('sum-bar').style.width = pct + '%', 300);

    // Build cards
    let currentFilter = 'all';
    const allCards = [];

    TROPHY_DEFS.forEach(t => {
        const isEarned = prog.trophies.includes(t.id);
        const card = document.createElement('div');
        card.className = `trophy-card ${isEarned ? 'unlocked' : 'locked'}`;
        card.dataset.state = isEarned ? 'unlocked' : 'locked';
        card.innerHTML = `
            <span class="trophy-emoji-big">${t.emoji}</span>
            <div class="trophy-card-name">${t.name}</div>
            <div class="trophy-card-desc">${t.desc}</div>
            <div class="trophy-status ${isEarned ? 'status-earned' : 'status-locked'}">
                ${isEarned ? '✓ Earned' : '🔒 Locked'}
            </div>
        `;
        if (isEarned) {
            card.onclick = () => showModal(t.emoji, t.name, t.desc, true);
        } else {
            card.onclick = () => showModal(t.emoji, t.name, t.desc, false);
        }
        document.getElementById('trophies-grid').appendChild(card);
        allCards.push(card);
    });

    // Filter function
    window.filterTrophies = (filter, btn) => {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        allCards.forEach(c => {
            const show = filter === 'all' || c.dataset.state === filter;
            c.style.display = show ? '' : 'none';
        });
    };

    // Modal
    window.showModal = (emoji, name, desc, earned) => {
        document.getElementById('modal-emoji').textContent = emoji;
        document.getElementById('modal-title').textContent = name;
        document.getElementById('modal-desc').textContent = desc;
        const statusEl = document.getElementById('modal-status');
        if (earned) {
            statusEl.textContent = '✓ Earned';
            statusEl.style.background = 'rgba(46,204,84,0.15)';
            statusEl.style.color = 'var(--green-mid)';
            statusEl.style.border = '1px solid rgba(46,204,84,0.3)';
        } else {
            statusEl.textContent = '🔒 Not yet earned';
            statusEl.style.background = 'rgba(255,255,255,0.05)';
            statusEl.style.color = 'var(--muted)';
            statusEl.style.border = '1px solid var(--border)';
        }
        document.getElementById('modal-overlay').classList.add('show');
    };

    window.closeModal = (e) => {
        if (e.target === document.getElementById('modal-overlay')) {
            document.getElementById('modal-overlay').classList.remove('show');
        }
    };
</script>
</body>
</html>
