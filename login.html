<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualVoice — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --green-dark: #1a7a2e; --green-mid: #2ecc54; --green-light: #57e07a;
            --gold: #FFD700; --bg: #0f1f13; --card-bg: #162a1b;
            --border: #2a4a32; --text: #e8f5ec; --muted: #7aad88;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; animation: float 8s ease-in-out infinite; pointer-events: none; }
        .blob1 { width: 400px; height: 400px; background: var(--green-mid); top: -100px; left: -100px; }
        .blob2 { width: 300px; height: 300px; background: var(--gold); bottom: -80px; right: -80px; animation-delay: 3s; }
        .blob3 { width: 250px; height: 250px; background: var(--green-light); top: 50%; left: 60%; animation-delay: 1.5s; }
        @keyframes float { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.05); } }
        .deco { position: fixed; font-size: 2.5rem; opacity: 0.08; animation: sway 6s ease-in-out infinite; pointer-events: none; user-select: none; }
        .deco:nth-child(4) { top:10%;left:5%;font-size:3rem; }
        .deco:nth-child(5) { top:70%;left:2%;animation-delay:2s; }
        .deco:nth-child(6) { top:20%;right:6%;animation-delay:1s;font-size:2rem; }
        .deco:nth-child(7) { top:80%;right:4%;animation-delay:3s;font-size:3.5rem; }
        .deco:nth-child(8) { top:45%;left:90%;animation-delay:0.5s; }
        @keyframes sway { 0%,100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }

        .page-wrapper { display: flex; width: 100%; max-width: 900px; min-height: 580px; border-radius: 28px; overflow: hidden; box-shadow: 0 30px 80px rgba(0,0,0,0.6); z-index: 10; margin: 1rem; }
        .left-panel { flex: 1; background: linear-gradient(145deg, #1f4d2a 0%, #0f2614 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 2.5rem; position: relative; overflow: hidden; }
        .left-panel::before { content:''; position: absolute; width:350px;height:350px; background: radial-gradient(circle,rgba(46,204,84,0.2),transparent 70%); top:-100px;left:-100px; }
        .brand-logo { font-family: 'Fredoka One', cursive; font-size: 2.8rem; color: #fff; letter-spacing: 1px; margin-bottom: 0.3rem; }
        .brand-tagline { color: var(--green-light); font-size: 0.95rem; font-weight: 600; text-align: center; margin-bottom: 3rem; }
        .mascot-area { position: relative; margin-bottom: 2rem; }
        .mascot-emoji { font-size: 6rem; display: block; text-align: center; animation: bounce 2s ease-in-out infinite; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4)); }
        @keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-12px); } }
        .xp-badge { position: absolute; top:-10px;right:-20px; background:var(--gold); color:#1a1a00; font-size:0.7rem; font-weight:900; padding:4px 10px; border-radius:20px; box-shadow:0 4px 12px rgba(255,215,0,0.4); animation:pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.08);} }
        .stats-row { display:flex;gap:1rem;margin-top:1rem;flex-wrap:wrap;justify-content:center; }
        .stat-pill { display:flex;align-items:center;gap:0.4rem;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:0.4rem 0.9rem;font-size:0.8rem;font-weight:700;color:#fff; }

        .right-panel { width: 380px; background: var(--card-bg); padding: 3rem 2.5rem; display: flex; flex-direction: column; justify-content: center; }
        .form-title { font-family:'Fredoka One',cursive;font-size:2rem;color:var(--text);margin-bottom:0.3rem; }
        .form-subtitle { color:var(--muted);font-size:0.9rem;font-weight:600;margin-bottom:2rem; }
        .tab-row { display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;margin-bottom:1.8rem; }
        .tab-btn { flex:1;padding:0.55rem;border:none;border-radius:9px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:800;cursor:pointer;transition:all 0.25s;background:transparent;color:var(--muted); }
        .tab-btn.active { background:var(--green-mid);color:#fff;box-shadow:0 4px 12px rgba(46,204,84,0.35); }
        .input-group { margin-bottom:1.1rem; }
        .input-label { display:block;font-size:0.8rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.4rem; }
        .input-wrap { position:relative; }
        .input-wrap > i { position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.9rem; }
        .form-input { width:100%;padding:0.75rem 0.75rem 0.75rem 2.4rem;background:rgba(255,255,255,0.06);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:600;outline:none;transition:border-color 0.2s,box-shadow 0.2s; }
        .form-input::placeholder { color:#4a6a54; }
        .form-input:focus { border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(46,204,84,0.15); }
        .toggle-pw { position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.85rem; }
        .forgot-link { text-align:right;margin-top:0.3rem; }
        .forgot-link a { color:var(--green-light);font-size:0.8rem;font-weight:700;text-decoration:none; }
        .submit-btn { width:100%;padding:0.9rem;background:linear-gradient(135deg,var(--green-mid),var(--green-dark));color:#fff;font-family:'Fredoka One',cursive;font-size:1.15rem;border:none;border-radius:14px;cursor:pointer;margin-top:1.5rem;box-shadow:0 6px 20px rgba(46,204,84,0.35);transition:all 0.25s; }
        .submit-btn:hover:not(:disabled) { transform:translateY(-2px);box-shadow:0 10px 30px rgba(46,204,84,0.5); }
        .submit-btn:disabled { opacity:0.7;cursor:not-allowed; }
        .divider { display:flex;align-items:center;gap:0.75rem;margin:1.2rem 0;color:var(--muted);font-size:0.78rem;font-weight:700; }
        .divider::before,.divider::after { content:'';flex:1;height:1px;background:var(--border); }
        .google-btn { width:100%;padding:0.75rem;background:rgba(255,255,255,0.06);border:2px solid var(--border);border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:all 0.2s; }
        .google-btn:hover { background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2); }
        .google-btn:disabled { opacity:0.7;cursor:not-allowed; }
        .google-icon { width:18px;height:18px; }
        #signup-fields { display:none; }
        .error-msg { font-size:0.82rem;font-weight:700;padding:0.5rem 0.8rem;border-radius:8px;margin-top:0.6rem;display:none; }
        .spinner { display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px; }
        @keyframes spin { to { transform:rotate(360deg); } }
        @media (max-width:650px) { .left-panel{display:none;} .right-panel{width:100%;padding:2.5rem 1.8rem;} .page-wrapper{border-radius:20px;} }
    </style>
</head>
<body>
    <div class="bg-blob blob1"></div>
    <div class="bg-blob blob2"></div>
    <div class="bg-blob blob3"></div>
    <div class="deco">🤟</div><div class="deco">✋</div>
    <div class="deco">👋</div><div class="deco">🤙</div><div class="deco">👌</div>

    <div class="page-wrapper">
        <div class="left-panel">
            <div class="brand-logo">VisualVoice</div>
            <div class="brand-tagline">Learn ASL. One sign at a time. 🤟</div>
            <div class="mascot-area">
                <span class="mascot-emoji">🦉</span>
                <div class="xp-badge">+50 XP on login!</div>
            </div>
            <div class="stats-row">
                <div class="stat-pill"><i class="fas fa-fire" style="color:#ff6b35;"></i> Build your streak</div>
                <div class="stat-pill"><i class="fas fa-trophy" style="color:#FFD700;"></i> Climb the league</div>
            </div>
        </div>

        <div class="right-panel">
            <div class="form-title" id="form-title">Welcome back 👋</div>
            <div class="form-subtitle" id="form-subtitle">Continue your signing journey</div>

            <div class="tab-row">
                <button type="button" class="tab-btn active" id="tab-login" onclick="switchTab('login')">Log In</button>

                <button type="button" class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <form id="auth-form" onsubmit="handleSubmit(event)">
                <div id="signup-fields">
                    <div class="input-group">
                        <label class="input-label">Your Name</label>
                        <div class="input-wrap">
                            <i class="fas fa-user"></i>
                            <input type="text" class="form-input" id="name-input" placeholder="e.g. Alex Rivera">
                        </div>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">Email</label>
                    <div class="input-wrap">
                        <i class="fas fa-envelope"></i>
                        <input type="email" class="form-input" id="email-input" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="input-group">
                    <label class="input-label">Password</label>
                    <div class="input-wrap">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-input" id="pw-input" placeholder="••••••••" required>
                        <button type="button" class="toggle-pw" onclick="togglePw()">
                            <i class="fas fa-eye" id="eye-icon"></i>
                        </button>
                    </div>
                    <div class="forgot-link" id="forgot-area">
                        <a href="#" onclick="handleForgotPassword(); return false;">Forgot password?</a>
                    </div>
                </div>
                <div class="error-msg" id="error-msg"></div>
                <button type="submit" class="submit-btn" id="submit-btn">Log In</button>
            </form>

            <div class="divider">or</div>
            <button class="google-btn" id="google-btn" onclick="handleGoogle()">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
            </button>
        </div>
    </div>

    <script type="module">
        import { logIn, signUp, signInWithGoogle, redirectIfLoggedIn } from './auth.js';
        import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { auth } from './firebase.js';

        redirectIfLoggedIn(); // Already logged in? → skip to dashboard

        let mode = 'login';

        window.switchTab = (newMode) => {
            console.log("MODE SWITCHED TO:", newMode); // debug

            mode = newMode;

            document.getElementById('tab-login').classList.toggle('active', newMode === 'login');
            document.getElementById('tab-signup').classList.toggle('active', newMode === 'signup');

            document.getElementById('signup-fields').style.display =
                newMode === 'signup' ? 'block' : 'none';

            document.getElementById('forgot-area').style.display =
                newMode === 'login' ? 'block' : 'none';

            document.getElementById('submit-btn').textContent =
                newMode === 'login' ? 'Log In' : 'Create Account';

            document.getElementById('form-title').textContent =
                newMode === 'login' ? 'Welcome back 👋' : 'Join for free! 🎉';

            document.getElementById('form-subtitle').textContent =
                newMode === 'login' ? 'Continue your signing journey' : 'Start learning ASL today';

            clearError();
        };

        window.togglePw = () => {
            const inp = document.getElementById('pw-input');
            const icon = document.getElementById('eye-icon');
            inp.type = inp.type === 'password' ? 'text' : 'password';
            icon.classList.toggle('fa-eye'); icon.classList.toggle('fa-eye-slash');
        };

        window.handleSubmit = async (e) => {
            e.preventDefault();
            clearError();
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('pw-input').value;
            const name = document.getElementById('name-input').value.trim();
            const btn = document.getElementById('submit-btn');

            btn.disabled = true;
            btn.innerHTML = `<span class="spinner"></span>${mode === 'login' ? 'Signing in...' : 'Creating account...'}`;

            try {
                if (mode === 'login') {
                    await logIn(email, password);
                } else {
                    if (!name) { showError('Please enter your name.'); resetBtn(btn); return; }
                    await signUp(name, email, password);
                }
                window.location.href = 'dashboard.html';
            } catch (err) {
                resetBtn(btn);
                showError(friendlyError(err.code));
            }
        };

        window.handleGoogle = async () => {
            const btn = document.getElementById('google-btn');
            btn.disabled = true; btn.textContent = 'Opening Google...';
            try {
                await signInWithGoogle();
                window.location.href = 'dashboard.html';
            } catch (err) {
                btn.disabled = false;
                btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
                showError(friendlyError(err.code));
            }
        };

        window.handleForgotPassword = async () => {
            const email = document.getElementById('email-input').value.trim();
            if (!email) { showError('Enter your email address first.'); return; }
            try {
                await sendPasswordResetEmail(auth, email);
                showError('Password reset email sent! Check your inbox.', true);
            } catch (err) { showError(friendlyError(err.code)); }
        };

        function showError(msg, ok = false) {
            const el = document.getElementById('error-msg');
            el.textContent = msg; el.style.display = 'block';
            el.style.background = ok ? 'rgba(87,224,122,0.1)' : 'rgba(255,71,87,0.15)';
            el.style.border = ok ? '1px solid rgba(87,224,122,0.3)' : '1px solid rgba(255,71,87,0.3)';
            el.style.color = ok ? '#57e07a' : '#ff6b76';
        }
        function clearError() { document.getElementById('error-msg').style.display = 'none'; }
        function resetBtn(btn) {
            btn.disabled = false;
            btn.textContent = mode === 'login' ? 'Log In' : 'Create Account';
        }
        function friendlyError(code) {
            return ({
                'auth/user-not-found':       'No account with that email. Try signing up!',
                'auth/wrong-password':        'Wrong password. Try again.',
                'auth/invalid-credential':    'Invalid email or password.',
                'auth/email-already-in-use':  'That email is already registered. Try logging in.',
                'auth/weak-password':         'Password must be at least 6 characters.',
                'auth/invalid-email':         'Please enter a valid email address.',
                'auth/popup-closed-by-user':  'Google sign-in was cancelled.',
                'auth/network-request-failed':'Network error. Check your connection.',
                'auth/too-many-requests':     'Too many attempts. Please wait and try again.',
            })[code] || 'Something went wrong. Please try again.';
        }
    </script>
</body>
</html>
