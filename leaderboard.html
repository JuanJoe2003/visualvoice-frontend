<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisualVoice — Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --green-dark:#1a7a2e;--green-mid:#2ecc54;--green-light:#57e07a;
            --gold:#FFD700;--gold-dark:#d4a800;--bg:#0f1f13;--sidebar-bg:#111d15;
            --card-bg:#162a1b;--border:#243d2b;--text:#e8f5ec;--muted:#7aad88;
            --danger:#ff4757;--streak:#ff6b35;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;}

        /* ── SIDEBAR ── */
        .sidebar{width:240px;min-height:100vh;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:1.5rem 1rem;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform 0.3s;}
        .sidebar-logo{font-family:'Fredoka One',cursive;font-size:1.7rem;color:var(--green-mid);padding:0.5rem 0.5rem 1.5rem;display:flex;align-items:center;gap:0.5rem;}
        .sidebar-nav{flex:1;}
        .nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.75rem 1rem;border-radius:14px;margin-bottom:0.3rem;cursor:pointer;transition:all 0.2s;color:var(--muted);font-weight:700;font-size:0.95rem;text-decoration:none;border:2px solid transparent;}
        .nav-item:hover{background:rgba(46,204,84,0.08);color:var(--green-light);}
        .nav-item.active{background:rgba(46,204,84,0.15);color:var(--green-mid);border-color:rgba(46,204,84,0.25);}
        .nav-item i{width:20px;text-align:center;}
        .nav-divider{height:1px;background:var(--border);margin:0.8rem 0.5rem;}
        .sidebar-user{background:var(--card-bg);border-radius:16px;padding:1rem;border:1px solid var(--border);margin-top:auto;}
        .user-info{display:flex;align-items:center;gap:0.75rem;}
        .user-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--green-mid),var(--green-dark));display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:900;color:#fff;border:2px solid var(--gold);flex-shrink:0;}
        .user-name{font-size:0.88rem;font-weight:800;color:var(--text);}
        .user-level{font-size:0.72rem;color:var(--muted);font-weight:600;}

        /* ── MAIN ── */
        .main{margin-left:240px;flex:1;padding:2rem;max-width:calc(100vw - 240px);overflow-x:hidden;}
        .page-title{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--text);margin-bottom:0.3rem;}
        .page-sub{color:var(--muted);font-size:0.9rem;font-weight:600;margin-bottom:2rem;}

        /* ── TOP 3 PODIUM ── */
        .podium{display:flex;align-items:flex-end;justify-content:center;gap:1rem;margin-bottom:2.5rem;padding:1.5rem;}
        .podium-slot{display:flex;flex-direction:column;align-items:center;gap:0.5rem;}
        .podium-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;color:#fff;border:3px solid transparent;}
        .podium-avatar.first{width:68px;height:68px;font-size:1.8rem;border-color:var(--gold);box-shadow:0 0 20px rgba(255,215,0,0.4);}
        .podium-avatar.second{border-color:#C0C0C0;}
        .podium-avatar.third{border-color:#CD7F32;}
        .podium-name{font-size:0.78rem;font-weight:800;color:var(--text);text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .podium-xp{font-size:0.72rem;font-weight:700;color:var(--muted);}
        .podium-medal{font-size:1.8rem;}
        .podium-slot.first .podium-medal{font-size:2.2rem;}
        .podium-block{border-radius:12px 12px 0 0;width:80px;display:flex;align-items:center;justify-content:center;}
        .podium-block.first{height:80px;background:linear-gradient(180deg,rgba(255,215,0,0.3),rgba(255,215,0,0.1));border:1px solid rgba(255,215,0,0.3);}
        .podium-block.second{height:60px;background:linear-gradient(180deg,rgba(192,192,192,0.2),rgba(192,192,192,0.05));border:1px solid rgba(192,192,192,0.2);}
        .podium-block.third{height:44px;background:linear-gradient(180deg,rgba(205,127,50,0.2),rgba(205,127,50,0.05));border:1px solid rgba(205,127,50,0.2);}
        .rank-label{font-family:'Fredoka One',cursive;font-size:1.2rem;}
        .rank-label.gold{color:var(--gold);}
        .rank-label.silver{color:#C0C0C0;}
        .rank-label.bronze{color:#CD7F32;}

        /* ── TABS ── */
        .tab-row{display:flex;gap:0;background:rgba(255,255,255,0.05);border-radius:14px;padding:4px;margin-bottom:1.5rem;width:fit-content;}
        .tab-btn{padding:0.5rem 1.5rem;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:800;cursor:pointer;transition:all 0.25s;background:transparent;color:var(--muted);}
        .tab-btn.active{background:var(--green-mid);color:#fff;box-shadow:0 4px 12px rgba(46,204,84,0.3);}

        /* ── LEAGUE BADGE ── */
        .league-section{margin-bottom:2rem;}
        .league-header{display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;}
        .league-badge{font-size:1.5rem;}
        .league-title{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--text);}
        .league-sub{font-size:0.78rem;font-weight:700;color:var(--muted);}

        /* ── LEADERBOARD TABLE ── */
        .lb-table{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;overflow:hidden;}
        .lb-row{display:flex;align-items:center;gap:1rem;padding:0.9rem 1.2rem;border-bottom:1px solid rgba(255,255,255,0.04);transition:all 0.2s;}
        .lb-row:last-child{border-bottom:none;}
        .lb-row:hover{background:rgba(255,255,255,0.03);}
        .lb-row.me{background:rgba(46,204,84,0.08);border-left:3px solid var(--green-mid);}
        .lb-row.me:hover{background:rgba(46,204,84,0.12);}

        .lb-rank-num{font-family:'Fredoka One',cursive;font-size:1.1rem;width:30px;text-align:center;flex-shrink:0;}
        .lb-rank-num.gold{color:var(--gold);}
        .lb-rank-num.silver{color:#C0C0C0;}
        .lb-rank-num.bronze{color:#CD7F32;}

        .lb-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--green-mid),var(--green-dark));display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;color:#fff;flex-shrink:0;}
        .lb-avatar.me-av{border:2px solid var(--green-mid);}

        .lb-info{flex:1;}
        .lb-name{font-size:0.9rem;font-weight:800;color:var(--text);}
        .lb-sub{font-size:0.72rem;font-weight:700;color:var(--muted);margin-top:0.1rem;}

        .lb-xp-col{text-align:right;}
        .lb-xp-val{font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--gold);}
        .lb-xp-lbl{font-size:0.68rem;font-weight:700;color:var(--muted);}

        /* ── YOUR RANK CARD ── */
        .your-rank-card{background:linear-gradient(135deg,#0f3d1a,#1a5c28);border:1px solid rgba(46,204,84,0.3);border-radius:20px;padding:1.2rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1rem;}
        .yr-label{font-size:0.75rem;font-weight:800;color:var(--green-light);text-transform:uppercase;letter-spacing:0.5px;}
        .yr-rank{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--text);}
        .yr-sub{font-size:0.8rem;font-weight:700;color:var(--muted);}
        .yr-divider{width:1px;height:40px;background:rgba(46,204,84,0.3);}

        /* ── LOADING ── */
        .loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1rem;}
        .loading-logo{font-family:'Fredoka One',cursive;font-size:2rem;color:var(--green-mid);}
        .loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--green-mid);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}

        .mobile-header{display:none;position:fixed;top:0;left:0;right:0;background:var(--sidebar-bg);border-bottom:1px solid var(--border);padding:1rem 1.5rem;z-index:200;align-items:center;justify-content:space-between;}
        .mobile-logo{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--green-mid);}
        .hamburger{background:none;border:none;color:var(--text);font-size:1.3rem;cursor:pointer;}
        @media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main{margin-left:0;padding:1rem;padding-top:5rem;max-width:100vw;}.mobile-header{display:flex;}.podium{padding:0.5rem;gap:0.5rem;}}
    </style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
    <div class="loading-logo">🤟 VisualVoice</div>
    <div class="loading-spinner"></div>
</div>

<header class="mobile-header">
    <div class="mobile-logo">🤟 VisualVoice</div>
    <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
</header>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><span>🤟</span> VisualVoice</div>
    <nav class="sidebar-nav">
        <a class="nav-item" href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
        <a class="nav-item" href="learn.html"><i class="fas fa-graduation-cap"></i> Learn</a>
        <a class="nav-item" href="practice.html"><i class="fas fa-camera"></i> Practice</a>
        <a class="nav-item" href="progress.html"><i class="fas fa-chart-bar"></i> Progress</a>
        <a class="nav-item" href="trophies.html"><i class="fas fa-trophy"></i> Trophies</a>
        <a class="nav-item active" href="leaderboard.html"><i class="fas fa-users"></i> Leaderboard</a>
        <div class="nav-divider"></div>
        <a class="nav-item" href="#"><i class="fas fa-store"></i> Shop</a>
        <a class="nav-item" href="#"><i class="fas fa-cog"></i> Settings</a>
        <a class="nav-item" id="logout-link" href="#"><i class="fas fa-sign-out-alt"></i> Log Out</a>
    </nav>
    <div class="sidebar-user">
        <div class="user-info">
            <div class="user-avatar" id="sb-avatar">?</div>
            <div>
                <div class="user-name" id="sb-name">Loading...</div>
                <div class="user-level" id="sb-level">⚡ 0 XP</div>
            </div>
        </div>
    </div>
</aside>

<main class="main">
    <div class="page-title">🥇 Leaderboard</div>
    <div class="page-sub" id="page-sub">See how you rank against other learners</div>

    <!-- Your rank card -->
    <div class="your-rank-card">
        <div>
            <div class="yr-label">Your Rank</div>
            <div class="yr-rank" id="yr-rank">#—</div>
        </div>
        <div class="yr-divider"></div>
        <div>
            <div class="yr-label">Your XP</div>
            <div class="yr-rank" id="yr-xp" style="color:var(--gold);">—</div>
        </div>
        <div class="yr-divider"></div>
        <div>
            <div class="yr-label">League</div>
            <div class="yr-rank" id="yr-league" style="font-size:1.4rem;">—</div>
        </div>
        <div style="margin-left:auto;">
            <div class="yr-sub" id="yr-sub">Keep earning XP to climb!</div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tab-row">
        <button class="tab-btn active" id="tab-weekly" onclick="switchTab('weekly')">This Week</button>
        <button class="tab-btn" id="tab-alltime" onclick="switchTab('alltime')">All Time</button>
    </div>

    <!-- Podium (top 3) -->
    <div class="podium" id="podium"></div>

    <!-- Full list -->
    <div class="lb-table" id="lb-table"></div>
</main>

<script type="module">
    import { requireAuth, logOut } from './auth.js';
    import { getUserProgress } from './progress.js';

    // ── NOTE: For a real leaderboard you'd query Firestore like:
    // const snapshot = await getDocs(query(collection(db, 'users'), orderBy('weeklyXp', 'desc'), limit(20)));
    // For now we use the current user's real data + sample others so it always shows your real rank.

    const user = await requireAuth();
    document.getElementById('logout-link').addEventListener('click', async e => { e.preventDefault(); await logOut(); });

    const prog = await getUserProgress(user.uid);
    document.getElementById('loading-overlay').style.display = 'none';

    // Sidebar
    const init = (prog.name || 'U')[0].toUpperCase();
    document.getElementById('sb-avatar').textContent = init;
    document.getElementById('sb-name').textContent = prog.name;
    document.getElementById('sb-level').textContent = `⚡ ${prog.xp} XP · ${prog.league}`;

    // Sample players (replace with real Firestore query when Firebase is set up)
    const samplePlayers = [
        { name:'ASL Master',   avatar:'A', xp:1250, weeklyXp:420, streak:20, league:'Gold',    sub:'🔥 20 day streak' },
        { name:'SignPro99',    avatar:'S', xp:980,  weeklyXp:380, streak:15, league:'Silver',  sub:'⚡ 42 lessons done' },
        { name:'HandTalker',   avatar:'H', xp:850,  weeklyXp:310, streak:8,  league:'Silver',  sub:'🌟 Perfect week' },
        { name:'SilentWords',  avatar:'S', xp:720,  weeklyXp:260, streak:5,  league:'Silver',  sub:'📚 3 levels done' },
        { name:'FingerSpell',  avatar:'F', xp:650,  weeklyXp:200, streak:3,  league:'Bronze',  sub:'🎯 Learning daily' },
        { name:'SignLearner',  avatar:'S', xp:430,  weeklyXp:150, streak:2,  league:'Bronze',  sub:'🌱 Just started' },
    ];

    // Inject real user
    const allPlayers = [...samplePlayers, {
        name: prog.name,
        avatar: init,
        xp: prog.xp,
        weeklyXp: prog.weeklyXp,
        streak: prog.streak,
        league: prog.league,
        sub: `🔥 ${prog.streak} day streak`,
        isMe: true,
    }];

    let currentTab = 'weekly';

    function renderBoard(tab) {
        const sorted = [...allPlayers].sort((a, b) =>
            tab === 'weekly' ? b.weeklyXp - a.weeklyXp : b.xp - a.xp
        );

        // Find user rank
        const myRank = sorted.findIndex(p => p.isMe) + 1;
        document.getElementById('yr-rank').textContent = `#${myRank}`;
        document.getElementById('yr-xp').textContent = tab === 'weekly' ? prog.weeklyXp + ' XP' : prog.xp + ' XP';
        document.getElementById('yr-league').textContent = prog.league;
        document.getElementById('yr-sub').textContent =
            myRank === 1 ? '🏆 You\'re at the top!' :
            myRank <= 3 ? `🔥 Top 3 — amazing!` :
            `${myRank - 1} players ahead of you`;

        // ── PODIUM (top 3) ──
        const podiumEl = document.getElementById('podium');
        podiumEl.innerHTML = '';
        const top3 = sorted.slice(0, 3);
        const podiumOrder = [top3[1], top3[0], top3[2]]; // 2nd, 1st, 3rd layout
        const podiumClasses = ['second', 'first', 'third'];
        const medals = ['🥈', '🥇', '🥉'];
        const rankLabels = ['2', '1', '3'];
        const rankColors = ['silver', 'gold', 'bronze'];

        podiumOrder.forEach((p, i) => {
            if (!p) return;
            const isMe = p.isMe;
            const slot = document.createElement('div');
            slot.className = `podium-slot ${podiumClasses[i]}`;
            slot.innerHTML = `
                <div class="podium-medal">${medals[i]}</div>
                <div class="podium-avatar ${podiumClasses[i]}" style="background:linear-gradient(135deg,${isMe?'var(--green-mid),var(--green-dark)':'#2a4a32,#1a3a22'})">
                    ${p.avatar}
                </div>
                <div class="podium-name">${p.name}${isMe?' (You)':''}</div>
                <div class="podium-xp">⚡ ${tab === 'weekly' ? p.weeklyXp : p.xp}</div>
                <div class="podium-block ${podiumClasses[i]}">
                    <span class="rank-label ${rankColors[i]}">${rankLabels[i]}</span>
                </div>
            `;
            podiumEl.appendChild(slot);
        });

        // ── FULL LIST ──
        const table = document.getElementById('lb-table');
        table.innerHTML = '';
        sorted.forEach((p, i) => {
            const rank = i + 1;
            const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
            const row = document.createElement('div');
            row.className = `lb-row ${p.isMe ? 'me' : ''}`;
            row.innerHTML = `
                <div class="lb-rank-num ${rankClass}">${rank}</div>
                <div class="lb-avatar ${p.isMe ? 'me-av' : ''}" style="background:linear-gradient(135deg,${p.isMe?'var(--green-mid),var(--green-dark)':'#2a4a32,#1a3a22'})">${p.avatar}</div>
                <div class="lb-info">
                    <div class="lb-name">${p.name}${p.isMe ? ' <span style="color:var(--green-mid);font-size:0.72rem;">(You)</span>' : ''}</div>
                    <div class="lb-sub">${p.sub} · ${p.league}</div>
                </div>
                <div class="lb-xp-col">
                    <div class="lb-xp-val">⚡ ${tab === 'weekly' ? p.weeklyXp : p.xp}</div>
                    <div class="lb-xp-lbl">${tab === 'weekly' ? 'this week' : 'total'}</div>
                </div>
            `;
            table.appendChild(row);
        });
    }

    window.switchTab = (tab) => {
        currentTab = tab;
        document.getElementById('tab-weekly').classList.toggle('active', tab === 'weekly');
        document.getElementById('tab-alltime').classList.toggle('active', tab === 'alltime');
        renderBoard(tab);
    };

    renderBoard('weekly');
</script>
</body>
</html>
